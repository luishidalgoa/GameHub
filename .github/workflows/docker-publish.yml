name: Build & publish Docker image

# Builds the production image for the Raspberry Pi (linux/arm64) and pushes it
# to GitHub Container Registry (GHCR). The Pi then just `docker compose pull`s
# it — no building on the device. See docs/deployment/ci-registry.md.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}          # allow manual runs from the Actions tab

env:
  IMAGE: ghcr.io/luishidalgoa/gamehub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the x86 runner build the arm64 image (emulated — slower, but
      # free and off the Pi).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=ref,event=tag

      - name: Build & push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
