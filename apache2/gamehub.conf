# /etc/apache2/sites-available/gamehub.conf
# Enable: sudo a2ensite gamehub.conf && sudo systemctl reload apache2
#
# Required modules (run once):
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName gamehub.luishidalgoa.ddns-ip.net

    # Let certbot handle ACME challenges
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName gamehub.luishidalgoa.ddns-ip.net

    # SSL — certbot will fill these in automatically
    SSLEngine On
    # SSLCertificateFile    /etc/letsencrypt/live/gamehub.luishidalgoa.ddns-ip.net/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/gamehub.luishidalgoa.ddns-ip.net/privkey.pem
    # Include               /etc/letsencrypt/options-ssl-apache.conf

    # ── Security headers ──────────────────────────────────────────────────────
    Header always set X-Frame-Options        "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy        "no-referrer"

    # ── Upload size (cover images — 50 MB) ───────────────────────────────────
    LimitRequestBody 52428800

    # ── WebSocket upgrade (Next.js HMR / future use) ─────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://127.0.0.1:3000/$1 [P,L]

    # ── Proxy to Next.js container ────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # Timeouts — large ROM downloads, don't cut them short
    ProxyTimeout 3600

    # ── Disable buffering for SSE (scanner stream) ────────────────────────────
    # These env vars tell mod_proxy_http to flush chunks immediately
    <Location /api/scanner/stream>
        SetEnv proxy-initial-not-buffered 1
        SetEnv proxy-sendchunks 1
        SetEnv proxy-chain-auth 1
    </Location>
</VirtualHost>
