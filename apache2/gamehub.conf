# /etc/apache2/sites-available/gamehub.conf
# Enable: sudo a2ensite gamehub.conf && sudo systemctl reload apache2
#
# Required modules (run once):
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName gamehub.luishidalgoa.ddns-ip.net

    # Let certbot handle ACME challenges
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
