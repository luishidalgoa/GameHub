<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName gamehub.luishidalgoa.ddns-ip.net

    # ── Certbot SSL Configuration (Rutas estándar fijas) ──────────────────────
    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/gamehub.luishidalgoa.ddns-ip.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/gamehub.luishidalgoa.ddns-ip.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Let certbot handle ACME challenges
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # ── Security headers ──────────────────────────────────────────────────────
    Header always set X-Frame-Options        "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy        "no-referrer"

    # ── Upload size (cover images — 50 MB) ───────────────────────────────────
    LimitRequestBody 52428800

    # ── WebSocket upgrade (Next.js HMR) ──────────────────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://127.0.0.1:3001/$1 [P,L]

    # ── Proxy to Next.js container (Port 3001) ────────────────────────────────
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # Timeouts — large ROM downloads
    ProxyTimeout 3600

    # ── Disable buffering for SSE (scanner stream) ────────────────────────────
    <Location /api/scanner/stream>
        SetEnv proxy-initial-not-buffered 1
        SetEnv proxy-sendchunks 1
        SetEnv proxy-chain-auth 1
    </Location>
</VirtualHost>
</IfModule>
