services:
  gamehub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamehub
    restart: unless-stopped

    env_file: .env.production

    ports:
      - "3000:3000"   # Nginx proxies to this; don't expose publicly if using nginx

    volumes:
      # ── Persistent data ──────────────────────────────────────────────────────
      # SQLite database
      - ./data:/data

      # Cover art cache (downloaded automatically by the app)
      - ./public/covers:/app/public/covers

      # ── ROM directories ──────────────────────────────────────────────────────
      # Whole drives mounted at their root — the scanner reaches any subfolder.
      # Configure the actual per-platform paths in Admin → Settings.
      - /mnt/F:/mnt/F:ro
      - /mnt/nextcloud_hdd_1:/mnt/nextcloud_hdd_1:ro

    # Expose Prometheus metrics to your existing Grafana/Node Exporter stack
    labels:
      - "com.centurylinklabs.watchtower.enable=true"   # optional: auto-updates via Watchtower

networks:
  default:
    name: gamehub-net
